name: nest-boilerplate

networks:
  default:
    name: nest-blp-nw

services:
  server:
    container_name: server
    #Dev mode
    # build:
    #   context: .
    #   dockerfile: ./docker/Dockerfile
    #   target: dev
    # command: ['pnpm', 'start:dev']
    #Prod mode
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: prod
    command: ['node', 'dist/src/main.js']
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      - AUTO_SEED=true # Set to false to disable auto-seeding
    ports:
      - $PORT:3000
    volumes:
      - ./logs:/app/logs # Persist logs on host

  database:
    container_name: database
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: $DB_USERNAME
      POSTGRES_PASSWORD: $DB_PASSWORD
      POSTGRES_DB: $DB_NAME
    ports:
      - $DB_PORT:5432
    env_file:
      - .env.production
    volumes:
      - ./.docker/docker-data/postgres_data:/data/db
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: $PGADMIN_DEFAULT_EMAIL
      PGADMIN_DEFAULT_PASSWORD: $PGADMIN_DEFAULT_PASSWORD
    ports:
      - 5050:80
    restart: always

  redis:
    container_name: redis1 # host connect redis-insight
    image: redis:8.2.3-alpine
    restart: unless-stopped
    command: sh /redis-init.sh
    ports:
      - $REDIS_PORT:6379
    volumes:
      - redis_data:/data
      - ./docker/redis-init.sh:/redis-init.sh:ro
      - ./.docker/docker-data/redis_data:/data
    env_file:
      - .env.production
    environment:
      REDIS_USERNAME: $REDIS_USERNAME
      REDIS_PASSWORD: $REDIS_PASSWORD

